name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    name: typecheck + unit + integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install dev tooling
        run: npm install --no-audit --no-fund
      - name: Test (typecheck + unit + integration)
        run: npm test
  mcp:
    name: mcp server contract smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install
        working-directory: mcp-server
        run: npm install --no-audit --no-fund
      - name: Smoke
        working-directory: mcp-server
        run: npm run smoke
  web:
    name: web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install
        working-directory: web
        run: npm install --no-audit --no-fund
      - name: Build
        working-directory: web
        run: npm run build
